<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review — Barton's Tree Care</title>
  <link rel="icon" type="image/png" href="assets/logos/bartons_logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #172e22;
      --green-mid:    #2d6048;
      --green-btn:    #3a7a5c;
      --green-hover:  #254d3a;
      --gold:         #d4941c;
      --charcoal:     #242424;
      --muted:        #6b6b6b;
      --white:        #ffffff;
      --bg:           #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo-wrap {
      margin-bottom: 32px;
    }

    .logo-wrap img {
      width: 110px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Divider line */
    .divider {
      width: 48px;
      height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    /* Headline */
    h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(22px, 5vw, 28px);
      color: var(--green-dark);
      line-height: 1.2;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .subheadline {
      font-size: 16px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 40px;
      letter-spacing: 0.01em;
    }

    /* Stars */
    .stars-link {
      display: inline-block;
      text-decoration: none;
      margin-bottom: 20px;
      line-height: 1;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .stars-link:hover {
      transform: scale(1.06);
      opacity: 0.88;
    }

    .stars {
      font-size: clamp(48px, 12vw, 64px);
      color: var(--gold);
      letter-spacing: 4px;
      display: block;
    }

    /* Helper text */
    .helper {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 32px;
      max-width: 340px;
    }

    /* CTA Button */
    .btn-review {
      display: inline-block;
      background: var(--green-btn);
      color: var(--white);
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 17px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 16px 44px;
      border-radius: 4px;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      box-shadow: 0 4px 18px rgba(23,46,34,.18);
      margin-bottom: 48px;
    }

    .btn-review:hover {
      background: var(--green-hover);
      box-shadow: 0 6px 24px rgba(23,46,34,.25);
      transform: translateY(-1px);
    }

    .btn-review:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(23,46,34,.15);
    }

    /* Footer */
    footer {
      border-top: 1px solid #e8e8e8;
      padding-top: 24px;
      width: 100%;
    }

    footer p {
      font-size: 13px;
      color: #aaaaaa;
      line-height: 1.7;
      letter-spacing: 0.02em;
    }

    footer p strong {
      display: block;
      color: #888888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 12px;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo-wrap">
      <img src="assets/logos/bartons_logo.png" alt="Barton's Tree Care">
    </div>

    <div class="divider"></div>

    <h1>Thank You For Choosing<br>Barton's Tree Care</h1>
    <p class="subheadline">We appreciate the opportunity to serve you.</p>

    <a class="stars-link" href="https://g.page/r/CUjGtRFLmJRNEAE/review" target="_blank" rel="noopener" aria-label="Leave a 5-star review on Google">
      <span class="stars">★★★★★</span>
    </a>

    <p class="helper">If you were happy with our work, we'd greatly appreciate your feedback.</p>

    <a class="btn-review" href="https://g.page/r/CUjGtRFLmJRNEAE/review" target="_blank" rel="noopener">
      Leave a Google Review
    </a>

    <footer>
      <p>
        <strong>Barton's Tree Care</strong>
        Serving Maryland Since 1989 &nbsp;·&nbsp; Licensed &amp; Insured
      </p>
    </footer>

  </div>

</body>
</html>
